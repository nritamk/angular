<section #hero id="home" class="hero" aria-label="Introduction">
  <div class="hero-bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="grain"></div>
  </div>

  <div class="container hero-grid">
    <div class="hero-content">
      <span class="eyebrow">JustVish Creative Studios</span>

      <h1 class="hero-title">
        We're not just another <em>creative</em> agency.
      </h1>

      <p class="hero-lead">
        We're storytellers, filmmakers, and brand architects who believe in the
        transformative power of visual narrative.
      </p>

      <div class="hero-actions">
        <a class="btn-pill" href="#contact">
          Start Your Story
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            aria-hidden="true"
          >
            <path
              d="M5 12h14M13 6l6 6-6 6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </a>
        <a class="btn-pill btn-ghost" href="#brand-identity"> See Our Work </a>
      </div>

      <div class="hero-stats">
        <div>
          <strong>120+</strong>
          <span>Films delivered</span>
        </div>
        <div>
          <strong>40+</strong>
          <span>Brands built</span>
        </div>
        <div>
          <strong>9 yrs</strong>
          <span>Of storytelling</span>
        </div>
      </div>
    </div>

    <div class="hero-visual">
      <img
        src="assets/hero-camera.png"
        alt="Cinematographer holding a professional cinema camera in soft golden light"
        loading="eager"
      />
    </div>
  </div>

  <a class="scroll-cue" href="#brand-identity" aria-label="Scroll down">
    <span>Scroll</span>
    <svg width="14" height="22" viewBox="0 0 14 22" fill="none">
      <rect
        x="1"
        y="1"
        width="12"
        height="20"
        rx="6"
        stroke="currentColor"
        stroke-width="1.4"
      />
      <circle cx="7" cy="7" r="1.6" fill="currentColor" />
    </svg>
  </a>
</section>
