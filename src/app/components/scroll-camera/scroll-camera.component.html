<div #cam class="float-cam" aria-hidden="true">
  <svg viewBox="0 0 200 130" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="fc-front" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#EDECEA"/>
        <stop offset="100%" stop-color="#D4D2CC"/>
      </linearGradient>
      <linearGradient id="fc-top" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#F4F3F1"/>
        <stop offset="100%" stop-color="#E0DFDA"/>
      </linearGradient>
      <linearGradient id="fc-right" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%"   stop-color="#C0BEB8"/>
        <stop offset="100%" stop-color="#AEACA6"/>
      </linearGradient>
      <linearGradient id="fc-metal" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%"   stop-color="#aaaaaa"/>
        <stop offset="30%"  stop-color="#e8e8e8"/>
        <stop offset="55%"  stop-color="#888888"/>
        <stop offset="100%" stop-color="#aaaaaa"/>
      </linearGradient>
      <radialGradient id="fc-glass" cx="38%" cy="32%" r="62%">
        <stop offset="0%"   stop-color="#4a6080"/>
        <stop offset="40%"  stop-color="#1a2535"/>
        <stop offset="100%" stop-color="#050c16"/>
      </radialGradient>
      <radialGradient id="fc-sheen" cx="33%" cy="28%" r="55%">
        <stop offset="0%"   stop-color="white" stop-opacity="0.38"/>
        <stop offset="70%"  stop-color="white" stop-opacity="0.04"/>
        <stop offset="100%" stop-color="white" stop-opacity="0"/>
      </radialGradient>
      <filter id="fc-drop" x="-20%" y="-20%" width="140%" height="160%">
        <feDropShadow dx="0" dy="4" stdDeviation="6"
                      flood-color="#000" flood-opacity="0.28"/>
      </filter>
    </defs>

    <g filter="url(#fc-drop)">
      <!-- ── TOP FACE (isometric) ── -->
      <polygon points="6,28 154,28 162,18 14,18"
               fill="url(#fc-top)" stroke="#1C1C1C" stroke-width="1.2"/>

      <!-- ── RIGHT FACE (isometric) ── -->
      <polygon points="154,28 162,18 162,90 154,102"
               fill="url(#fc-right)" stroke="#1C1C1C" stroke-width="1.2"/>

      <!-- ── FRONT FACE ── -->
      <rect x="6" y="28" width="148" height="74" rx="5"
            fill="url(#fc-front)" stroke="#1C1C1C" stroke-width="1.5"/>
      <!-- top-edge shimmer -->
      <line x1="8" y1="29.5" x2="152" y2="29.5"
            stroke="rgba(255,255,255,0.55)" stroke-width="1"/>

      <!-- ── TOP HANDLE ── -->
      <rect x="40" y="16" width="8" height="13" rx="2"
            fill="#D8D6D0" stroke="#1C1C1C" stroke-width="1.2"/>
      <rect x="84" y="16" width="8" height="13" rx="2"
            fill="#D8D6D0" stroke="#1C1C1C" stroke-width="1.2"/>
      <path d="M44 16 C44 6, 88 6, 88 16"
            stroke="#1C1C1C" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path d="M44 16 C44 6, 88 6, 88 16"
            stroke="#CECDCB" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M50 11 C60 6, 74 6, 82 11"
            stroke="rgba(28,28,28,0.22)" stroke-width="0.8" fill="none"
            stroke-dasharray="3 2" stroke-linecap="round"/>
      <path d="M46 12 C60 7, 76 7, 86 12"
            stroke="rgba(255,255,255,0.4)" stroke-width="1" fill="none"
            stroke-linecap="round"/>

      <!-- ── LENS ASSEMBLY ── -->
      <!-- AO shadow -->
      <circle cx="58" cy="65" r="27" fill="rgba(0,0,0,0.18)"/>
      <!-- outer housing -->
      <circle cx="58" cy="65" r="25.5"
              fill="#2A2A28" stroke="url(#fc-metal)" stroke-width="2"/>
      <!-- follow-focus gear -->
      <circle cx="58" cy="65" r="22.5"
              fill="#222220" stroke="#3A3A38" stroke-width="3"
              stroke-dasharray="2.4 1"/>
      <!-- barrel -->
      <circle cx="58" cy="65" r="18.5"
              fill="#1A1A18" stroke="#333330" stroke-width="1.2"/>
      <!-- iris -->
      <circle cx="58" cy="65" r="15"
              fill="#111110" stroke="#222228" stroke-width="1"/>
      <!-- glass -->
      <circle cx="58" cy="65" r="13" fill="url(#fc-glass)"/>
      <circle cx="58" cy="65" r="13" fill="url(#fc-sheen)"/>
      <!-- inner rings -->
      <circle cx="58" cy="65" r="10"
              fill="none" stroke="#1E2C3A" stroke-width="1"/>
      <circle cx="58" cy="65" r="6.5" fill="#050c16"/>
      <!-- specular -->
      <ellipse cx="51" cy="58" rx="4.5" ry="3"
               fill="rgba(255,255,255,0.28)" transform="rotate(-25 51 58)"/>
      <ellipse cx="49.5" cy="56.5" rx="1.5" ry="1"
               fill="rgba(255,255,255,0.55)" transform="rotate(-25 49.5 56.5)"/>
      <!-- coating reflex -->
      <path d="M54 62 Q57 57.5 63 60.5"
            stroke="rgba(100,140,255,0.2)" stroke-width="1.8"
            fill="none" stroke-linecap="round"/>
      <!-- focus ticks -->
      <g stroke="#888" stroke-width="0.6" stroke-linecap="round">
        <line x1="58" y1="39.5" x2="58" y2="42.5"/>
        <line x1="58" y1="87.5" x2="58" y2="90.5"/>
        <line x1="32.5" y1="65" x2="35.5" y2="65"/>
        <line x1="80.5" y1="65" x2="83.5" y2="65"/>
        <line x1="40" y1="47" x2="42.1" y2="49.1"/>
        <line x1="74" y1="47" x2="71.9" y2="49.1"/>
        <line x1="40" y1="83" x2="42.1" y2="80.9"/>
        <line x1="74" y1="83" x2="71.9" y2="80.9"/>
      </g>

      <!-- ── VIEWFINDER MODULE (top-right) ── -->
      <rect x="112" y="16" width="28" height="14" rx="2"
            fill="#D8D6D0" stroke="#1C1C1C" stroke-width="1.2"/>
      <rect x="115" y="18.5" width="22" height="9" rx="1"
            fill="#1A2535" stroke="#253545" stroke-width="0.6"/>
      <ellipse cx="126" cy="23" rx="9" ry="4" fill="#0A1522" opacity="0.9"/>
      <circle  cx="126" cy="23" r="2.2" fill="#050e18"/>

      <!-- ── RIGHT CONTROL PANEL ── -->
      <rect x="97" y="34" width="50" height="62" rx="2"
            fill="#DDDBD6" stroke="#1C1C1C" stroke-width="1"/>

      <!-- LCD -->
      <rect x="100" y="37" width="44" height="26" rx="2"
            fill="#0A1825" stroke="#1A3040" stroke-width="0.8"/>
      <!-- LCD green row 1 -->
      <rect x="102" y="39.5" width="10" height="3.5" rx="0.5" fill="#00CC66" opacity="0.85"/>
      <rect x="114" y="39.5" width="7"  height="3.5" rx="0.5" fill="#00AA55" opacity="0.7"/>
      <rect x="123" y="39.5" width="5"  height="3.5" rx="0.5" fill="#007740" opacity="0.5"/>
      <rect x="130" y="39.5" width="12" height="3.5" rx="0.5" fill="#4488FF" opacity="0.6"/>
      <!-- LCD row 2 -->
      <rect x="102" y="45" width="8"  height="2.5" rx="0.4" fill="#6688AA" opacity="0.5"/>
      <rect x="112" y="45" width="10" height="2.5" rx="0.4" fill="#6688AA" opacity="0.4"/>
      <rect x="124" y="45" width="18" height="2.5" rx="0.4" fill="#44BB55" opacity="0.65"/>
      <!-- LCD audio bars -->
      <rect x="102" y="49.5" width="40" height="1.8" rx="0.3" fill="#006633" opacity="0.4"/>
      <rect x="102" y="53"   width="28" height="1.8" rx="0.3" fill="#00CC66" opacity="0.5"/>
      <rect x="102" y="56.5" width="18" height="1.8" rx="0.3" fill="#00CC66" opacity="0.38"/>

      <!-- Buttons row -->
      <circle cx="103" cy="70" r="3.5" fill="#C8C6C0" stroke="#AEACA8" stroke-width="0.8"/>
      <circle cx="112" cy="70" r="3.5" fill="#C8C6C0" stroke="#AEACA8" stroke-width="0.8"/>
      <circle cx="121" cy="70" r="3.5" fill="#C8C6C0" stroke="#AEACA8" stroke-width="0.8"/>
      <!-- REC button -->
      <circle cx="133" cy="70" r="5"   fill="#1A0000" stroke="#CC2222" stroke-width="1.5"/>
      <circle cx="133" cy="70" r="3"   fill="#DD2222">
        <animate attributeName="opacity" values="1;0.12;1" dur="1.4s" repeatCount="indefinite"/>
      </circle>

      <!-- Jog wheel -->
      <circle cx="119" cy="84" r="8.5" fill="#C8C6C0" stroke="#A8A6A0" stroke-width="1"/>
      <circle cx="119" cy="84" r="6"   fill="#D8D6D0" stroke="#B8B6B0" stroke-width="0.7"/>
      <circle cx="119" cy="84" r="2"   fill="#B0AEA8"/>
      <line x1="119" y1="75.5" x2="119" y2="78.5"
            stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
      <g fill="#888888">
        <circle cx="119"   cy="75.4" r="0.8"/>
        <circle cx="124.6" cy="77.4" r="0.7"/>
        <circle cx="127.2" cy="83.5" r="0.7"/>
        <circle cx="124.6" cy="89.6" r="0.7"/>
        <circle cx="119"   cy="92.6" r="0.8"/>
        <circle cx="113.4" cy="89.6" r="0.7"/>
        <circle cx="110.8" cy="83.5" r="0.7"/>
        <circle cx="113.4" cy="77.4" r="0.7"/>
      </g>

      <!-- I/O ports strip (right edge) -->
      <rect x="147" y="40" width="7" height="5"  rx="1" fill="#B0AEA8" stroke="#9A9892" stroke-width="0.6"/>
      <rect x="147" y="49" width="7" height="4"  rx="1" fill="#B0AEA8" stroke="#9A9892" stroke-width="0.6"/>
      <rect x="147" y="57" width="7" height="7"  rx="1" fill="#B0AEA8" stroke="#9A9892" stroke-width="0.6"/>
      <circle cx="150.5" cy="60.5" r="2" fill="#9A9892" stroke="#888680" stroke-width="0.4"/>
      <rect x="147" y="68" width="7" height="10" rx="1" fill="#B0AEA8" stroke="#9A9892" stroke-width="0.6"/>

      <!-- ── BOTTOM PLATE ── -->
      <rect x="10" y="103" width="142" height="6" rx="2"
            fill="#D0CEC8" stroke="#1C1C1C" stroke-width="1"/>
      <circle cx="72" cy="106" r="1.8" fill="#B8B6B0"/>
      <circle cx="81" cy="106" r="1.8" fill="#B8B6B0"/>
      <circle cx="90" cy="106" r="1.8" fill="#B8B6B0"/>

      <!-- ── STATUS LIGHTS ── -->
      <!-- REC tally -->
      <circle cx="25" cy="27" r="3.5" fill="#CC1A1A">
        <animate attributeName="opacity" values="1;0.08;1" dur="1.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="25" cy="27" r="2" fill="#FF4040">
        <animate attributeName="opacity" values="1;0.1;1" dur="1.4s" repeatCount="indefinite"/>
      </circle>
      <!-- Power light -->
      <circle cx="35" cy="27" r="2.2" fill="#5B9A3A">
        <animate attributeName="opacity" values="0.55;1;0.55" dur="2.8s" repeatCount="indefinite"/>
      </circle>

      <!-- ── LEFT BATTERY CONNECTOR ── -->
      <rect x="8" y="38" width="11" height="26" rx="2"
            fill="#D8D6D0" stroke="#1C1C1C" stroke-width="1"/>
      <rect x="10" y="42" width="7" height="2" rx="0.5" fill="#B8B6B0"/>
      <rect x="10" y="46" width="7" height="2" rx="0.5" fill="#B8B6B0"/>
      <rect x="10" y="50" width="7" height="2" rx="0.5" fill="#B8B6B0"/>
      <rect x="10" y="54" width="7" height="2" rx="0.5" fill="#B8B6B0"/>
    </g>
  </svg>
</div>
