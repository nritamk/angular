<header class="navbar-wrap" [class.is-scrolled]="scrolled()">
  <nav #nav class="navbar" aria-label="Primary navigation">
    <a class="brand" href="#home" (click)="closeMenu()">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="15" stroke="currentColor" stroke-width="1.5" />
          <circle cx="16" cy="16" r="6" fill="currentColor" />
        </svg>
      </span>
      <span class="brand-name">JustVish</span>
    </a>

    <ul class="nav-links" [class.open]="menuOpen()">
      @for (link of links; track link.href) {
        <li>
          <a [href]="link.href" (click)="closeMenu()">{{ link.label }}</a>
        </li>
      }
    </ul>

    <a class="btn-pill nav-cta" href="#contact" (click)="closeMenu()">
      Let's Connect
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </a>

    <button
      class="menu-toggle"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Toggle menu"
      (click)="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>
</header>
